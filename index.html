        source:'Colorado State Extension — "Watering Lawns"' },

  };

  // Fall back to midwest if zone not found
  const tasks = (calendars[zone] || calendars['midwest']).map(task => {
    const windows = task.timing.map(w => {
      const start = new Date(yr, w.start[0], w.start[1]);
      const end   = new Date(yr, w.end[0], w.end[1]);
      const daysUntilStart = Math.ceil((start - today) / 86400000);
      const daysUntilEnd   = Math.ceil((end - today) / 86400000);
      const isActive   = today >= start && today <= end;
      const isUpcoming = !isActive && daysUntilStart > 0 && daysUntilStart <= 45;
      const isPast     = daysUntilEnd < 0;
      const status = isPast ? 'past' : isActive ? 'active' : isUpcoming ? 'upcoming' : 'future';
      return { ...w, start, end, daysUntilStart, daysUntilEnd, isActive, isUpcoming, isPast, status };
    });
    const bestWindow = windows.find(w => w.isActive) || windows.find(w => w.isUpcoming) || windows[0];
    return { ...task, windows, bestWindow };
  });

  return tasks;
}

function getClimateZone(zip) {
  const n = parseInt(zip, 10);
  if (isNaN(n)) return 'midwest';
  const p = Math.floor(n / 1000);
  if (p <= 9)  return 'warm';
  if (p <= 19) return 'northeast';
  if (p <= 26) return 'northeast';
  if (p <= 29) return 'transition';
  if (p <= 39) return 'warm';
  if (p <= 52) return 'midwest';
  if (p <= 56) return 'midwest';
  if (p <= 59) return 'midwest';
  if (p <= 65) return 'midwest';
  if (p <= 69) return 'midwest';
  if (p <= 79) return 'warm';
  if (p <= 84) return 'mountain';
  if (p <= 86) return 'warm';
  if (p <= 89) return 'mountain';
  if (p <= 96) return 'pacific';
  if (p <= 99) return 'pacific';
  return 'midwest';
}

function getRegionLabel(zone) {
  return { northeast:'Northeast', midwest:'Midwest', transition:'Transition Zone', warm:'Warm Climate', mountain:'Mountain West', pacific:'Pacific Coast' }[zone] || 'Your Region';
}

const YearProgress = ({ today }) => {
  const start = new Date(today.getFullYear(), 0, 1);
  const end   = new Date(today.getFullYear(), 11, 31);
  const pct   = (today - start) / (end - start) * 100;
  const months = ['J','F','M','A','M','J','J','A','S','O','N','D'];
  return (
    <div style={{ padding:'0 20px 4px' }}>
      <div style={{ position:'relative', height:4, background:T.border, borderRadius:99 }}>
        <div style={{ position:'absolute', left:0, top:0, height:'100%', width:`${pct}%`, background:T.green, borderRadius:99, transition:'width 0.6s ease' }} />
        <div style={{ position:'absolute', top:-4, left:`${pct}%`, transform:'translateX(-50%)', width:12, height:12, borderRadius:'50%', background:T.green, border:`2.5px solid ${T.bgCard}`, boxShadow:T.shadow, transition:'left 0.6s ease' }} />
      </div>
      <div style={{ display:'flex', justifyContent:'space-between', marginTop:5 }}>
        {months.map((m,i) => (
          <span key={i} style={{ fontSize:9, color: i===today.getMonth() ? T.green : T.textSoft, fontWeight: i===today.getMonth() ? 700 : 400, transition:'color 0.3s' }}>{m}</span>
        ))}
      </div>
    </div>
  );
};

// ─── SOIL TEMPERATURE MODEL + LIVE FETCH ─────────────────────────────────────
// Primary: Live fetch from Open-Meteo (free, no API key) — returns hourly soil
//   temperature at 6cm depth from the nearest weather model grid point.
//   API: https://api.open-meteo.com/v1/forecast?latitude=X&longitude=Y

//   (MAWN for Midwest, CIMIS for Pacific, etc.)
//   Formula: T_soil(doy) = T_mean + A × cos(2π/365 × (doy − peak_doy))

async function fetchLiveSoilTemp(zip) {
  const { lat, lon } = zipToLatLon(zip);
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=soil_temperature_6cm&forecast_days=1&temperature_unit=fahrenheit&timezone=auto`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('fetch failed');
  const data = await res.json();
  // Use the reading closest to noon today
  const temps = data.hourly?.soil_temperature_6cm;
  if (!temps || !temps.length) throw new Error('no data');
  // Grab the noon value (index 12 of 24-hour array)
  const noonTemp = temps[Math.min(12, temps.length - 1)];
  return Math.round(noonTemp);
}

function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  return Math.floor((date - start) / 86400000);
}

function estimateSoilTemp(zone, date) {
  const p = SOIL_PARAMS[zone] || SOIL_PARAMS.midwest;
  const doy = getDayOfYear(date);
  return Math.round(p.mean + p.amp * Math.cos(2 * Math.PI / 365 * (doy - p.peak)));
}

// What the temp means for lawn tasks
function getSoilTempContext(tempF) {
  if (tempF < 32)  return { label:'Frozen',                        color:'#7bb8d4', bg:'oklch(91% 0.04 230)', hint:'Soil is frozen. No lawn activity possible.', icon:'🧊' };
  if (tempF < 40)  return { label:'Dormant',                       color:'#7bb8d4', bg:'oklch(93% 0.03 230)', hint:'Grass is dormant. Roots begin activity above 40°F.', icon:'❄️' };
  if (tempF < 50)  return { label:'Too cold to seed',              color:'#91a89e', bg:'oklch(93% 0.02 160)', hint:'Soil warming. Pre-emergent season approaching.', icon:'🌡️' };
  if (tempF < 55)  return { label:'Pre-emergent window opens soon',color:'#c49a28', bg:'oklch(93% 0.05 85)',  hint:'Apply pre-emergent BEFORE soil hits 55°F. Window is closing.', icon:'⚠️' };
  if (tempF < 60)  return { label:'Pre-emergent: Apply now!',      color:'#d4700a', bg:'oklch(92% 0.06 60)',  hint:'55–60°F: Crabgrass is starting to germinate. Pre-emergent must go down immediately.', icon:'🛡️' };
  if (tempF < 65)  return { label:'Seeding window open',           color:'#3d9e58', bg:'oklch(91% 0.06 142)', hint:'50–65°F is the ideal germination range for cool-season grasses.', icon:'🌱' };
  if (tempF < 70)  return { label:'Good seeding conditions',       color:'#3d9e58', bg:'oklch(91% 0.06 142)', hint:'Still in the seeding window. Germination may be slightly slower above 65°F.', icon:'🌱' };
  if (tempF < 80)  return { label:'Seeding getting risky',         color:'#c49a28', bg:'oklch(93% 0.05 85)',  hint:'Above 70°F soil temps stress new seedlings. Water heavily if seeding.', icon:'🌤️' };
  if (tempF < 85)  return { label:'Heat stress zone',              color:'#d4600a', bg:'oklch(92% 0.06 55)',  hint:'Grass growth slows significantly. Avoid fertilizing or seeding.', icon:'☀️' };
  return             { label:'Root damage risk',                   color:'#c93030', bg:'oklch(91% 0.07 30)',  hint:'Above 85°F soil temps can damage cool-season roots. Water deeply.', icon:'🔥' };
}

// Get the 1–2 phenological indicators most relevant to current soil temp
function getCurrentPhenoIndicators(zone, tempF) {
  const all = PHENO_INDICATORS[zone] || PHENO_INDICATORS.midwest;
  // Find indicators within ±8°F of current temp, prefer closest
  return all
    .map(p => ({ ...p, diff: Math.abs(p.soilTemp - tempF) }))
    .filter(p => p.diff <= 10)
    .sort((a, b) => a.diff - b.diff)
    .slice(0, 2);
}

// Which tasks are directly gated by soil temperature
const SOIL_TEMP_TASKS = {
  preemergent: { low: 45, high: 55, label: 'Pre-emergent window' },
  overseed:    { low: 50, high: 65, label: 'Overseeding window' },
  seed_new:    { low: 50, high: 65, label: 'New seed window' },
  spring_fert: { low: 55, high: 75, label: 'Spring fertilizer window' },
  fall_fert:   { low: 50, high: 65, label: 'Fall fertilizer window' },
};

const SoilTempWidget = ({ zone, today, tasks, zip, onTaskClick }) => {
  const [expanded, setExpanded] = useState(false);
  const [liveTemp, setLiveTemp]   = useState(null);
  const [liveStatus, setLiveStatus] = useState('loading'); // 'loading' | 'live' | 'estimated'

  // Fallback model estimate
  const modelTemp = estimateSoilTemp(zone, today);

  // Fetch live temp on mount (only when simulated date matches today closely)
  const isRealDate = Math.abs(today - new Date()) < 2 * 86400000; // within 2 days of now

  useEffect(() => {
    if (!zip || !isRealDate) { setLiveStatus('estimated'); return; }
    setLiveStatus('loading');
    fetchLiveSoilTemp(zip)
      .then(t => { setLiveTemp(t); setLiveStatus('live'); })
      .catch(() => { setLiveTemp(null); setLiveStatus('estimated'); });
  }, [zip, zone]);

  const tempF = (liveStatus === 'live' && liveTemp !== null) ? liveTemp : modelTemp;
  const ctx = getSoilTempContext(tempF);
  const gatedTasks = tasks.filter(t => SOIL_TEMP_TASKS[t.id]);
  const phenoNow = getCurrentPhenoIndicators(zone, tempF);

  const minT = 20, maxT = 100;
  const pct = Math.min(100, Math.max(0, (tempF - minT) / (maxT - minT) * 100));

  const scaleZones = [
    { lo:20, hi:40,  col:'#7bb8d4' },
    { lo:40, hi:50,  col:'#b8cfc8' },
    { lo:50, hi:55,  col:'#e8d080' },
    { lo:55, hi:60,  col:'#f0a040' },
    { lo:60, hi:70,  col:'#60c070' },
    { lo:70, hi:85,  col:'#f0c840' },
    { lo:85, hi:100, col:'#e06030' },
  ];

  return (
    <div style={{ margin:'0 0 12px', borderRadius:T.radius, overflow:'hidden', border:`1px solid ${T.border}`, background:ctx.bg, transition:'background 0.4s' }}>
      {/* Collapsed header */}
      <button onClick={() => setExpanded(e => !e)} style={{
        width:'100%', display:'flex', alignItems:'center', gap:12, padding:'13px 16px',
        background:'none', border:'none', cursor:'pointer', fontFamily:'Sora, sans-serif', textAlign:'left',
      }}>
        {/* Thermometer SVG */}
        <div style={{ position:'relative', width:28, height:28, flexShrink:0 }}>
          <svg viewBox="0 0 28 28" width="28" height="28">
            <rect x="11" y="3" width="6" height="16" rx="3" fill="oklch(85% 0.02 75)" />
            <rect x="12.5" y={3 + 16 * (1 - pct/100)} width="3" height={16 * pct/100} rx="1.5" fill={ctx.color} />
            <circle cx="14" cy="21" r="5" fill={ctx.color} />
            <circle cx="14" cy="21" r="3.5" fill={ctx.color} opacity="0.6" />
          </svg>
        </div>
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:2 }}>
            {liveStatus === 'loading'
              ? <span style={{ fontSize:14, color:T.textMid }}>Fetching live data…</span>
              : <span style={{ fontSize:22, fontWeight:700, color:ctx.color, lineHeight:1 }}>{tempF}°F</span>
            }
            <span style={{ fontSize:10, color:T.textMid }}>
              {liveStatus === 'live' ? '📡 live · 6cm depth' : liveStatus === 'estimated' ? '〜 model estimate' : ''}
            </span>
          </div>
          <div style={{ fontSize:11, fontWeight:600, color:ctx.color }}>{ctx.icon} {ctx.label}</div>
        </div>
        <span style={{ color:T.textSoft, fontSize:14, transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition:'transform 0.2s' }}>▾</span>
      </button>

      {/* Expanded detail */}
      {expanded && (
        <div style={{ borderTop:`1px solid ${T.border}`, padding:'14px 16px 16px' }}>
          {/* Gradient scale */}
          <div style={{ marginBottom:14 }}>
            <div style={{ position:'relative', height:10, borderRadius:99, overflow:'hidden', display:'flex', marginBottom:6 }}>
              {scaleZones.map((z,i) => (
                <div key={i} style={{ flex: z.hi - z.lo, background: z.col }} />
              ))}
              <div style={{ position:'absolute', top:-3, left:`${pct}%`, transform:'translateX(-50%)', width:3, height:16, background:T.text, borderRadius:99, boxShadow:'0 0 4px rgba(0,0,0,0.3)' }} />
            </div>
            <div style={{ display:'flex', justifyContent:'space-between' }}>
              <span style={{ fontSize:9, color:T.textSoft }}>20°F</span>
              <span style={{ fontSize:9, color:T.textSoft }}>Frozen · Cold · Pre-em · Seed zone · Warm · Hot</span>
              <span style={{ fontSize:9, color:T.textSoft }}>100°F</span>
            </div>
          </div>

          {/* Hint */}
          <div style={{ fontSize:12, color:T.text, lineHeight:1.6, marginBottom:14 }}>{ctx.hint}</div>

          {/* Phenological indicators */}
          {phenoNow.length > 0 && (
            <div style={{ marginBottom:14 }}>
              <div style={{ fontSize:10, fontWeight:700, color:T.textSoft, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Nature's indicators right now</div>
              {phenoNow.map((p, i) => (
                <div key={i} style={{
                  display:'flex', gap:10, alignItems:'flex-start', padding:'10px 12px',
                  background:T.bgCard, borderRadius:T.radiusSm, marginBottom:6,
                  border:`1px solid ${T.border}`,
                }}>
                  <span style={{ fontSize:18, flexShrink:0 }}>{p.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:12, fontWeight:600, color:T.text, marginBottom:2 }}>{p.name}</div>
                    <div style={{ fontSize:11, color:T.textMid, lineHeight:1.5, marginBottom:4 }}>{p.action}</div>
                    <div style={{ fontSize:10, color:T.textSoft }}>📚 {p.source}</div>
                  </div>
                  <div style={{ fontSize:10, fontWeight:600, color:T.textSoft, background:T.bgDeep, padding:'2px 7px', borderRadius:99, flexShrink:0 }}>{p.soilTemp}°F</div>
                </div>
              ))}
            </div>
          )}

          {/* Gated tasks */}
          <div style={{ fontSize:10, fontWeight:700, color:T.textSoft, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:8 }}>Soil-temp gated tasks</div>
          {gatedTasks.map(task => {
            const gate = SOIL_TEMP_TASKS[task.id];
            const inRange = tempF >= gate.low && tempF <= gate.high;
            const approaching = !inRange && tempF < gate.low && tempF >= gate.low - 8;
            const past = tempF > gate.high;
            return (
              <button key={task.id} onClick={() => onTaskClick(task)} style={{
                width:'100%', display:'flex', alignItems:'center', gap:10, padding:'9px 11px',
                background: inRange ? T.greenPale : T.bgCard,
                border:`1px solid ${inRange ? T.greenLt : T.border}`,
                borderRadius:T.radiusSm, marginBottom:6, cursor:'pointer',
                fontFamily:'Sora, sans-serif', textAlign:'left', transition:'all 0.15s',
              }}>
                <span style={{ fontSize:16 }}>{task.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, fontWeight:600, color: inRange ? T.green : T.text }}>{task.name}</div>
                  <div style={{ fontSize:10, color:T.textSoft }}>{gate.label}: {gate.low}–{gate.high}°F</div>
                </div>
                <div style={{
                  fontSize:10, fontWeight:600, padding:'2px 7px', borderRadius:99,
                  background: inRange ? T.green : approaching ? T.goldPale : past ? T.border : T.bgDeep,
                  color: inRange ? '#fff' : approaching ? T.gold : T.textSoft,
                }}>
                  {inRange ? '✓ In range' : approaching ? 'Approaching' : past ? 'Too warm' : 'Not yet'}
                </div>
              </button>
            );
          })}

          {/* Source note */}
          <div style={{ marginTop:10, fontSize:10, color:T.textSoft, lineHeight:1.5, display:'flex', gap:5 }}>
            <span>{liveStatus === 'live' ? '📡' : '〜'}</span>
            <span>
              {liveStatus === 'live'
                ? `Live reading from Open-Meteo weather model (6cm depth). Nearest grid point to ZIP ${zip}.`
                : `Modeled estimate from historical ${EXTENSION_SOURCES[zone]?.name || 'extension'} climate averages. Use a soil thermometer at 2" depth for precision.`
              }
            </span>
          </div>
        </div>
      )}
    </div>
  );
};

                    <div style={{ width:36, height:36, borderRadius:12, background: task.bestWindow.isActive ? T.greenPale : T.bgDeep, display:'flex', alignItems:'center', justifyContent:'center', fontSize:18, flexShrink:0 }}>{task.icon}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:T.text, marginBottom:2 }}>{task.name}</div>
                      <div style={{ fontSize:11, color:T.textSoft, marginBottom:4 }}>{task.bestWindow.label}</div>
                      <StatusBadge status={task.bestWindow.status} daysUntilStart={task.bestWindow.daysUntilStart} />
                    </div>
                    <CheckButton checked={false} onToggle={() => onToggleChecked(task.id)} />
                  </div>
                ))}
              </div>
            )}

            {Object.values(checked).filter(Boolean).length > 0 && (
              <button onClick={onClearChecked} style={{
                width:'100%', marginTop:8, padding:'12px', borderRadius:T.radiusSm, border:`1px solid ${T.border}`,
                background:'none', color:T.textSoft, fontSize:12, cursor:'pointer', fontFamily:'Sora, sans-serif',
              }}>Clear all completed</button>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "simulatedDate": "2026-05-02"
}/*EDITMODE-END*/;

// ─── CHECKLIST PERSISTENCE ───────────────────────────────────────────────────
function loadChecked() {
  try { return JSON.parse(localStorage.getItem('easylawn_checked') || '{}'); } catch { return {}; }
}
function saveChecked(obj) {
  try { localStorage.setItem('easylawn_checked', JSON.stringify(obj)); } catch {}
}
// Reset checklist at start of each new season year
function getSeasonKey() {
  const d = new Date();
  // Season year: fall tasks belong to current year, spring tasks to next
  return `${d.getFullYear()}`;
}

const App = () => {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = useState('zip');
  const [zip, setZip] = useState('');
  const [checked, setChecked] = useState(() => loadChecked());

  const toggleChecked = (taskId) => {
    setChecked(prev => {
      const next = { ...prev, [taskId]: !prev[taskId] };
      saveChecked(next);
      return next;
    });
  };
  const [selectedTask, setSelectedTask] = useState(null);

  const simDate = tweaks.simulatedDate ? new Date(tweaks.simulatedDate + 'T12:00:00') : new Date();
  const zone = getClimateZone(zip);
  const tasks = zip ? getLawnTasks(zone, simDate) : [];
  const region = getRegionLabel(zone);

  const clearChecked = () => {
    setChecked({});
    saveChecked({});
  };
  const handleZip = z => { setZip(z); setScreen('home'); };
  const handleTaskClick = task => { setSelectedTask(task); setScreen('detail'); };
  const handleBack = () => { setSelectedTask(null); setScreen('home'); };

  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'center', width:'100%', height:'100%', background:'oklch(20% 0.02 60)' }}>
      <IOSDevice width={390} height={812}>
        <div style={{ display:'flex', flexDirection:'column', width:'100%', height:'100%', overflow:'hidden', fontFamily:'Sora, sans-serif' }}>
          {screen === 'zip'    && <ZipScreen onSubmit={handleZip} />}
          {screen === 'home'   && <HomeScreen tasks={tasks} region={region} today={simDate} zone={zone} zip={zip} onTaskClick={handleTaskClick} checked={checked} onToggleChecked={toggleChecked} onClearChecked={clearChecked} />}
          {screen === 'detail' && selectedTask && <TaskDetail task={selectedTask} onBack={handleBack} today={simDate} zone={zone} />}
        </div>
      </IOSDevice>

      <TweaksPanel>
        <TweakSection title="Simulate Date">
          <TweakText id="simulatedDate" label="Date (YYYY-MM-DD)" value={tweaks.simulatedDate} onChange={v => setTweak('simulatedDate', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
